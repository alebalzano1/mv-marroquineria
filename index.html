    // ─────────────────────────────────────────────
    // EDIT MODAL (EXPANDIDO CON FOTOS Y DETALLES)
    // ─────────────────────────────────────────────
    function EditModal({ product, onSave, onClose }) {
      const isNew = !product;
      const [uploading, setUploading] = useState(false);

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const url = await FirebaseService.uploadImage(file);
          const current = form.imagesStr ? form.imagesStr.split(",").map(c => c.trim()).filter(Boolean) : [];
          current.push(url);
          setForm(f => ({ ...f, imagesStr: current.join(", ") }));
        } catch (err) {
          alert("Error al subir la imagen: " + err.message);
        } finally {
          setUploading(false);
        }
      };

      const [form, setForm] = useState(product ? {
        ...product,
        colorsStr: product.colors.join(", "),
        imagesStr: product.images.join(", "),
        material: product.specs?.material || "",
        medidas: product.specs?.medidas || "",
        cierre: product.specs?.cierre || "",
        interior: product.specs?.interior || ""
      } : {
        name: "", category: "Bolsos", price: "", description: "", longDescription: "", colorsStr: "Camel, Negro",
        emoji: "👜", tag: "", featured: false, available: true, imagesStr: "",
        material: "", medidas: "", cierre: "", interior: ""
      });

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const submit = () => {
        if (!form.name || !form.price) return;
        const colors = form.colorsStr.split(",").map(c => c.trim()).filter(Boolean);
        const images = form.imagesStr.split(",").map(c => c.trim()).filter(Boolean);
        
        onSave({
          ...form,
          price: Number(form.price),
          colors,
          images,
          longDescription: form.longDescription || form.description,
          specs: {
            material: form.material,
            medidas: form.medidas,
            cierre: form.cierre,
            interior: form.interior
          },
          id: product?.id
        });
      };

      return html`
        <div style=${s.overlayDrawer} onClick=${onClose}>
          <div style=${s.editDrawer} onClick=${e => e.stopPropagation()} className="drawer">
            
            <div style=${{ padding: "24px 28px", borderBottom: "1px solid " + BORDER, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h2 style=${{ margin: 0, fontSize: 22, fontFamily: "'Cormorant Garamond',serif", fontWeight: 400 }}>
                ${isNew ? "Nuevo producto" : "Editar producto"}
              </h2>
              <button style=${{ background: "none", border: "none", color: MUTED, fontSize: 20, cursor: "pointer" }} onClick=${onClose}>✕</button>
            </div>

            <div style=${{ flex: 1, overflowY: "auto", padding: "24px 28px", display: "flex", flexDirection: "column", gap: 20 }}>
              
              <!-- NOMBRE + PRECIO -->
              <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <div>
                  <label style=${s.label}>Nombre *</label>
                  <input value=${form.name} onChange=${e => set("name", e.target.value)} placeholder="Ej: Bandolera Clásica" style=${s.input} />
                </div>
                <div>
                  <label style=${s.label}>Precio ($) *</label>
                  <input type="number" value=${form.price} onChange=${e => set("price", e.target.value)} placeholder="18500" style=${s.input} />
                </div>
              </div>

              <!-- CATEGORÍA + TAG -->
              <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <div>
                  <label style=${s.label}>Categoría</label>
                  <select value=${form.category} onChange=${e => set("category", e.target.value)} style=${s.input}>
                    ${["Bolsos", "Billeteras", "Neceseres", "Accesorios"].map(c => html`<option key=${c}>${c}</option>`)}
                  </select>
                </div>
                <div>
                  <label style=${s.label}>Etiqueta (opcional)</label>
                  <input value=${form.tag || ""} onChange=${e => set("tag", e.target.value || null)} placeholder="Ej: Nuevo, Top, Oferta" style=${s.input} />
                </div>
              </div>

              <!-- FOTOS REALES (URLs) + CARGADOR CLOUDINARY -->
              <div>
                <label style=${s.label}>Fotos del Producto</label>
                
                <!-- Selector de Archivo / Drop Area -->
                <div style=${{
                  border: "2px dashed " + BORDER,
                  borderRadius: 8,
                  padding: "16px 20px",
                  background: SURFACE,
                  textAlign: "center",
                  cursor: "pointer",
                  position: "relative",
                  marginBottom: 12,
                  transition: "all 0.2s"
                }} className="photo-upload-zone">
                  ${uploading ? html`
                    <div style=${{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                      <div style=${{ width: 18, height: 18, border: "2px solid rgba(200,135,58,0.2)", borderTopColor: ACCENT, borderRadius: "50%", animation: "spin 0.6s linear infinite" }}></div>
                      <span style=${{ fontSize: 13, color: MUTED }}>Subiendo foto a Cloudinary...</span>
                    </div>
                  ` : html`
                    <span style=${{ fontSize: 13, color: TEXT }}>📸 Arrastrá una foto acá o hacé clic para seleccionar</span>
                    <input type="file" accept="image/*" onChange=${handleImageUpload} style=${{ position: "absolute", inset: 0, opacity: 0, cursor: "pointer", width: "100%" }} />
                  `}
                </div>

                <!-- Fallback manual (lista de URLs) -->
                <label style=${{ ...s.label, fontSize: 10, color: MUTED, marginTop: 8 }}>URLs de Fotos (separadas por coma)</label>
                <textarea value=${form.imagesStr} onChange=${e => set("imagesStr", e.target.value)} placeholder="https://ejemplo.com/foto1.jpg, https://ejemplo.com/foto2.jpg" rows="2" style=${{ ...s.input, resize: "vertical" }} />
              </div>

              <!-- EMOJI PICKER FALLBACK -->
              <div>
                <label style=${s.label}>Emoji Fallback (si no hay fotos)</label>
                <div style=${{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
                  ${EMOJIS.map(e => html`
                    <button key=${e} onClick=${() => set("emoji", e)} style=${{ fontSize: 24, padding: 8, background: form.emoji === e ? "rgba(200,135,58,0.2)" : SURFACE2, border: "1px solid " + (form.emoji === e ? ACCENT : BORDER), borderRadius: 8, cursor: "pointer" }}>${e}</button>
                  `)}
                </div>
              </div>

              <!-- DESCRIPCIÓN CORTA -->
              <div>
                <label style=${s.label}>Descripción Corta</label>
                <input value=${form.description} onChange=${e => set("description", e.target.value)} placeholder="Resumen para la tarjeta..." style=${s.input} />
              </div>

              <!-- DESCRIPCIÓN LARGA -->
              <div>
                <label style=${s.label}>Descripción Larga (Detalle)</label>
                <textarea value=${form.longDescription} onChange=${e => set("longDescription", e.target.value)} rows="3" style=${{ ...s.input, resize: "vertical" }} placeholder="Detalles de diseño, materiales, historia del producto..." />
              </div>

              <!-- COLORES -->
              <div>
                <label style=${s.label}>Colores (separados por coma)</label>
                <input value=${form.colorsStr} onChange=${e => set("colorsStr", e.target.value)} placeholder="Camel, Negro, Marrón" style=${s.input} />
              </div>

              <!-- ESPECIFICACIONES TÉCNICAS -->
              <div style=${{ border: "1px solid " + BORDER, borderRadius: 8, padding: 14, background: SURFACE2 }}>
                <label style=${{ ...s.label, color: ACCENT, marginBottom: 12 }}>Especificaciones Técnicas</label>
                <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div>
                    <label style=${{ ...s.label, fontSize: 10 }}>Material</label>
                    <input value=${form.material} onChange=${e => set("material", e.target.value)} placeholder="Ej: Cuero Vacuno" style=${s.input} />
                  </div>
                  <div>
                    <label style=${{ ...s.label, fontSize: 10 }}>Medidas</label>
                    <input value=${form.medidas} onChange=${e => set("medidas", e.target.value)} placeholder="Ej: 25 x 18 x 8 cm" style=${s.input} />
                  </div>
                  <div>
                    <label style=${{ ...s.label, fontSize: 10 }}>Cierre</label>
                    <input value=${form.cierre} onChange=${e => set("cierre", e.target.value)} placeholder="Ej: Metálico YKK" style=${s.input} />
                  </div>
                  <div>
                    <label style=${{ ...s.label, fontSize: 10 }}>Interior</label>
                    <input value=${form.interior} onChange=${e => set("interior", e.target.value)} placeholder="Ej: Forrado en raso" style=${s.input} />
                  </div>
                </div>
              </div>

            </div>

            <!-- FOOTER -->
            <div style=${{ padding: "20px 28px", borderTop: "1px solid " + BORDER, display: "flex", gap: 12 }}>
              <button style=${{ flex: 1, padding: 14, background: "#2a2a2a", border: "none", color: TEXT, borderRadius: 8, cursor: "pointer" }} onClick=${onClose}>Cancelar</button>
              <button style=${{ flex: 2, padding: 14, background: ACCENT, border: "none", color: "#000", borderRadius: 8, cursor: "pointer", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }} onClick=${submit} className="primary-btn">
                ${isNew ? "Crear producto" : "Guardar cambios"}
              </button>
            </div>

          </div>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // TAB ADMIN: GESTIÓN DE PEDIDOS + EXPORT EXCEL
    // ─────────────────────────────────────────────
    function AdminOrders({ orders, updateOrders, showToast }) {
      const [filterStatus, setFilterStatus] = useState("Todos");
      const [expandedOrderId, setExpandedOrderId] = useState(null);
      const [excelModalOpen, setExcelModalOpen] = useState(false);

      const changeStatus = (id, status) => {
        const next = orders.map(o => o.id === id ? { ...o, status } : o);
        updateOrders(next);
        showToast("✓ Estado del pedido actualizado");
      };

      const getStatusBadgeStyle = (status) => {
        if (status === "pendiente") return { background: "rgba(251,191,36,0.15)", color: "#fbbf24", border: "1px solid rgba(251,191,36,0.3)" };
        if (status === "en_preparacion") return { background: "rgba(59,130,246,0.15)", color: "#60a5fa", border: "1px solid rgba(59,130,246,0.3)" };
        if (status === "enviado") return { background: "rgba(20,184,166,0.15)", color: "#2dd4bf", border: "1px solid rgba(20,184,166,0.3)" };
        return { background: "rgba(156,163,175,0.15)", color: "#9ca3af", border: "1px solid rgba(156,163,175,0.3)" };
      };

      const filtered = orders.filter(o => filterStatus === "Todos" || o.status === filterStatus);

      // Export functions using SheetJS
      const handleExportExcel = ({ dateFrom, dateTo, status }) => {
        let exportData = orders;
        if (dateFrom) exportData = exportData.filter(o => new Date(o.date) >= new Date(dateFrom));
        if (dateTo) exportData = exportData.filter(o => new Date(o.date) <= new Date(dateTo + "T23:59:59"));
        if (status !== "Todos") exportData = exportData.filter(o => o.status === status);

        if (exportData.length === 0) {
          alert("No hay pedidos que coincidan con los filtros seleccionados.");
          return;
        }

        // Sheet 1: Orders
        const sheet1Data = exportData.map(o => ({
          "N° Orden": o.id,
          "Fecha": new Date(o.date).toLocaleString("es-AR"),
          "Cliente": o.clientName,
          "Teléfono": o.clientPhone,
          "Zona Envío": o.shippingZone || "No especificada",
          "Cupón": o.couponCode || "Ninguno",
          "Subtotal": o.subtotal,
          "Descuento": o.discount,
          "Envío": o.shippingCost,
          "Total": o.total,
          "Estado": o.status.toUpperCase()
        }));

        // Sheet 2: Item details
        const sheet2Data = [];
        exportData.forEach(o => {
          o.items.forEach(i => {
            sheet2Data.push({
              "N° Orden": o.id,
              "Fecha": new Date(o.date).toLocaleString("es-AR"),
              "Producto": i.name,
              "Color": i.color,
              "Cantidad": i.qty,
              "Precio Unit": i.price,
              "Subtotal": i.price * i.qty
            });
          });
        });

        // Sheet 3: Summary
        const totalSales = exportData.filter(o => o.status === "entregado").reduce((s, o) => s + o.total, 0);
        const totalDiscounts = exportData.reduce((s, o) => s + o.discount, 0);
        const totalShipping = exportData.reduce((s, o) => s + o.shippingCost, 0);
        const avgTicket = exportData.length ? Math.round(exportData.reduce((s, o) => s + o.total, 0) / exportData.length) : 0;
        const highestOrder = exportData.length ? Math.max(...exportData.map(o => o.total)) : 0;

        const sheet3Data = [{
          "Total pedidos": exportData.length,
          "Total en ventas (Entregados)": totalSales,
          "Descuentos otorgados": totalDiscounts,
          "Envíos cobrados": totalShipping,
          "Ticket promedio": avgTicket,
          "Pedido más alto": highestOrder
        }];

        const wb = XLSX.utils.book_new();
        const ws1 = XLSX.utils.json_to_sheet(sheet1Data);
        const ws2 = XLSX.utils.json_to_sheet(sheet2Data);
        const ws3 = XLSX.utils.json_to_sheet(sheet3Data);

        // Autofit columns helper
        const autofit = (ws, data) => {
          if (!data.length) return;
          const cols = Object.keys(data[0]).map(key => {
            let maxLen = key.toString().length;
            data.forEach(row => {
              const val = row[key];
              if (val !== null && val !== undefined) {
                maxLen = Math.max(maxLen, val.toString().length);
              }
            });
            return { wch: maxLen + 4 };
          });
          ws["!cols"] = cols;
        };

        autofit(ws1, sheet1Data);
        autofit(ws2, sheet2Data);
        autofit(ws3, sheet3Data);

        XLSX.utils.book_append_sheet(wb, ws1, "Pedidos");
        XLSX.utils.book_append_sheet(wb, ws2, "Detalle productos");
        XLSX.utils.book_append_sheet(wb, ws3, "Resumen");

        const dateStr = new Date().toISOString().split("T")[0];

    function AdminCoupons({ coupons, updateCoupons, showToast }) {
      const [editCoupon, setEditCoupon] = useState(false);
      const [form, setForm] = useState({ code: "", type: "percent", value: "", minOrder: 0, expiresAt: "", maxUses: 0, usedCount: 0, active: true });

      const handleAdd = () => {
        if (!form.code || !form.value) return;
        const exists = coupons.some(c => c.code === form.code);
        if (exists) { alert("Este código de cupón ya existe."); return; }

        updateCoupons([...coupons, { ...form, code: form.code.trim().toUpperCase(), value: Number(form.value), minOrder: Number(form.minOrder), maxUses: Number(form.maxUses) }]);
        setEditCoupon(false);
        setForm({ code: "", type: "percent", value: "", minOrder: 0, expiresAt: "", maxUses: 0, usedCount: 0, active: true });
        showToast("✓ Cupón creado exitosamente");
      };

      const toggleActive = (code) => {
        updateCoupons(coupons.map(c => c.code === code ? { ...c, active: !c.active } : c));
        showToast("✓ Estado del cupón actualizado");
      };

      const deleteCoupon = (code) => {
        if (confirm("¿Estás seguro de eliminar el cupón " + code + "?")) {
          updateCoupons(coupons.filter(c => c.code !== code));
          showToast("🗑 Cupón eliminado");
        }
      };

      const generateCode = () => {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let res = "";
        for (let i = 0; i < 8; i++) res += chars[Math.floor(Math.random() * chars.length)];
        setForm(f => ({ ...f, code: res }));
      };

      return html`

                ${coupons.length === 0 ? html`
                  <tr>
                    <td colSpan="7" style=${{ padding: "40px 20px", textAlign: "center", color: MUTED }}>No hay cupones creados aún.</td>
                  </tr>
                ` : coupons.map(c => html`
                  <tr key=${c.code} style=${{ borderBottom: "1px solid rgba(200,135,58,0.08)" }}>

                    <td style=${{ padding: "14px 20px" }}>${c.minOrder === 0 ? "Sin mínimo" : fmt(c.minOrder)}</td>

    // ─────────────────────────────────────────────
    // TAB ADMIN: ESTADÍSTICAS (SVGs PUROS)

    function AdminStats({ orders, products }) {
      const deliveredOrders = orders.filter(o => o.status === "entregado");

      const totalSales = deliveredOrders.reduce((s, o) => s + o.total, 0);
      const ordersCount = orders.length;
      const avgTicket = deliveredOrders.length ? Math.round(totalSales / deliveredOrders.length) : 0;

      // Most sold item calculation
      const productSales = {};
      orders.forEach(o => {
        o.items.forEach(item => {
          productSales[item.name] = (productSales[item.name] || 0) + item.qty;
        });
      });
      const sortedProducts = Object.entries(productSales)
        .map(([name, qty]) => ({ name, qty }))
        .sort((a, b) => b.qty - a.qty);

      const bestSeller = sortedProducts.length ? sortedProducts[0].name : "Ninguno";

      // SVG Chart 1: Sales in the last 7 days
      const last7Days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date();
        d.setDate(d.getDate() - i);
        return d.toISOString().split("T")[0];
      }).reverse();

      const salesByDay = last7Days.map(date => {
        const amount = orders
          .filter(o => o.date.startsWith(date) && o.status === "entregado")
          .reduce((s, o) => s + o.total, 0);
        return { date, amount };
      });

      const maxSales = Math.max(...salesByDay.map(s => s.amount), 1);

      // SVG Chart 2: Top 5 products sold (horizontal bar chart)
      const top5Products = sortedProducts.slice(0, 5);
      const maxQty = Math.max(...top5Products.map(p => p.qty), 1);

      return html`
        <div>
          <h2 style=${{ fontSize: 24, fontWeight: 300, fontFamily: "'Cormorant Garamond',serif", marginBottom: 28 }}>Métricas e Informes</h2>

          <!-- TOP METRICS CARDS -->
          <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(200px,1fr))", gap: 16, marginBottom: 32 }}>
            ${[
              { label: "Ventas Totales (Entregado)", value: fmt(totalSales), color: "#4ade80" },
              { label: "Pedidos Registrados", value: ordersCount, color: "#60a5fa" },
              { label: "Ticket Promedio (Entregado)", value: fmt(avgTicket), color: ACCENT },
              { label: "Producto Estrella", value: bestSeller, color: "#fbbf24" }
            ].map(st => html`
              <div key=${st.label} style=${{ background: SURFACE, border: "1px solid " + BORDER, borderRadius: 12, padding: 20 }}>
                <div style=${{ fontSize: 26, fontWeight: 700, color: st.color, fontFamily: "'Cormorant Garamond',serif", textOverflow: "ellipsis", overflow: "hidden", whiteSpace: "nowrap" }}>${st.value}</div>
                <div style=${{ fontSize: 12, color: MUTED, marginTop: 4 }}>${st.label}</div>
              </div>
            `)}
          </div>

          <!-- GRÁFICOS SVG PUROS -->
          <div style=${{ display: "grid", gridTemplateColumns: "1fr", gap: 24, marginBottom: 32 }} className="stats-charts">
            
            <!-- VENTAS 7 DIAS -->
            <div style=${{ background: SURFACE, border: "1px solid " + BORDER, borderRadius: 12, padding: 24, flex: 1 }}>
              <h3 style=${{ fontSize: 18, fontFamily: "'Cormorant Garamond',serif", color: TEXT, marginBottom: 24 }}>Ventas de los Últimos 7 Días ($ ARS)</h3>
              <div style=${{ display: "flex", gap: 16, height: 200, alignItems: "flex-end", paddingBottom: 10 }}>
                ${salesByDay.map(d => {
                  const heightPct = (d.amount / maxSales) * 100;
                  return html`
                    <div key=${d.date} style=${{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
                      <div
                        title=${fmt(d.amount)}
                        style=${{
                          width: "100%",
                          height: heightPct + "%",
                          background: ACCENT,
                          borderRadius: "4px 4px 0 0",
                          transition: "height 0.5s ease",
                          cursor: "pointer",
                          minHeight: d.amount > 0 ? "5%" : "0%"
                        }}
                        className="chart-bar"
                      >
                        <span className="chart-tooltip">${fmt(d.amount)}</span>
                      </div>
                      <span style=${{ fontSize: 11, color: MUTED, marginTop: 10, fontFamily: "sans-serif" }}>${d.date.slice(8, 10)}/${d.date.slice(5, 7)}</span>
                    </div>
                  `;
                })}
              </div>
            </div>

            <!-- TOP PRODUCTOS HORIZONTAL -->
            <div style=${{ background: SURFACE, border: "1px solid " + BORDER, borderRadius: 12, padding: 24, flex: 1 }}>
              <h3 style=${{ fontSize: 18, fontFamily: "'Cormorant Garamond',serif", color: TEXT, marginBottom: 24 }}>Top 5 Productos Más Vendidos (Unidades)</h3>
              <div style=${{ display: "flex", flexDirection: "column", gap: 16 }}>
                ${top5Products.length === 0 ? html`
                  <p style=${{ color: MUTED, fontSize: 13, textAlign: "center", padding: "40px 0" }}>No hay registros de ventas aún.</p>
                ` : top5Products.map(p => {
                  const widthPct = (p.qty / maxQty) * 100;
                  return html`
                    <div key=${p.name} style=${{ display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style=${{ display: "flex", justifyContent: "space-between", fontSize: 12, color: TEXT, fontFamily: "sans-serif" }}>
                        <span>${p.name}</span>
                        <span style=${{ fontWeight: 700, color: ACCENT }}>${p.qty} uds</span>
                      </div>
                      <div style=${{ width: "100%", height: 10, background: BORDER, borderRadius: 5, overflow: "hidden" }}>
                        <div style=${{ width: widthPct + "%", height: "100%", background: ACCENT, borderRadius: 5, transition: "width 0.5s ease" }} />
                      </div>
                    </div>
                  `;
                })}
              </div>
            </div>

          </div>

          <!-- TABLA BESTSELLERS TOTAL -->
          <div style=${{ background: SURFACE, border: "1px solid " + BORDER, borderRadius: 12, padding: 24 }}>
            <h3 style=${{ fontSize: 18, fontFamily: "'Cormorant Garamond',serif", color: TEXT, marginBottom: 16 }}>Listado de Productos Vendidos</h3>
            <table style=${{ width: "100%", borderCollapse: "collapse", fontSize: 13, color: TEXT, textAlign: "left" }}>
              <thead>
                <tr style=${{ borderBottom: "1px solid " + BORDER, paddingBottom: 10 }}>
                  <th style=${{ padding: "10px 0", color: MUTED }}>Ranking</th>
                  <th style=${{ padding: "10px 0", color: MUTED }}>Producto</th>
                  <th style=${{ padding: "10px 0", color: MUTED, textAlign: "right" }}>Unidades Vendidas</th>
                </tr>
              </thead>
              <tbody>
                ${sortedProducts.map((p, idx) => html`
                  <tr key=${p.name} style=${{ borderBottom: "1px solid rgba(200,135,58,0.06)" }}>
                    <td style=${{ padding: "12px 0", fontWeight: 700, color: ACCENT }}>#${idx + 1}</td>
                    <td style=${{ padding: "12px 0" }}>${p.name}</td>
                    <td style=${{ padding: "12px 0", textAlign: "right", fontWeight: 700 }}>${p.qty} unidades</td>
                  </tr>
                `)}
              </tbody>
            </table>
          </div>

        </div>
      `;
    }

      .cart-btn:hover { border-color:#C8873A !important; }
      .wa-btn:hover { opacity:0.9; }
      .fab:hover { transform:scale(1.05); }
      .cat-btn:hover { color:#C8873A !important; border-color:#C8873A !important; }
      .private-access-btn:hover { border-color:#C8873A !important; color:#C8873A !important; background:rgba(200,135,58,0.05) !important; }
      .footer-insta:hover { opacity:0.8; text-decoration:underline !important; }
      
      /* Slider doble */
      input[type="range"].dual-slider {
        position: absolute;
        width: 100%;
        background: none;
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
        height: 0;
        outline: none;
      }
      input[type="range"].dual-slider::-webkit-slider-thumb {
        pointer-events: auto;
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #C8873A;
        cursor: pointer;
        border: 2px solid #0e0b08;
        box-shadow: 0 0 4px rgba(200,135,58,0.5);
      }
      input[type="range"].dual-slider::-moz-range-thumb {
        pointer-events: auto;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #C8873A;
        cursor: pointer;
        border: 2px solid #0e0b08;
        box-shadow: 0 0 4px rgba(200,135,58,0.5);
      }

      /* Hover zoom detalle */
      .detail-main-img:hover {
        transform: scale(1.02);
      }
      .detail-main-img {
        transition: transform 0.3s ease;
      }

      .fav-heart:hover {
        transform: scale(1.2);
        color: #C8873A !important;
      }

      /* Detail grid responsive */
      .detail-grid {
        grid-template-columns: 1.2fr 1fr !important;
      }
      @media (max-width: 768px) {

          grid-template-columns: 1fr !important;

          overflow-x: auto;

          border-right: none !important;
          border-bottom: 1px solid rgba(200,135,58,0.18);
        }
        .sidebar-tab-btn {
          width: auto !important;
          white-space: nowrap;
          border-left: none !important;
          border-bottom: 3px solid transparent;
        }
        .sidebar-tab-btn {
          border-bottom: 3px solid #C8873A !important;
        }
        .stats-charts {
          grid-template-columns: 1fr !important;
        }
      }
    `;

    const adminCSS = `
      .admin-card { transition:transform 0.25s, border-color 0.25s; animation:fadeUp 0.4s both; }
      .admin-card:hover { transform:translateY(-3px); border-color:rgba(200,135,58,0.4) !important; }
      .stat-card { transition:border-color 0.2s; }
      .stat-card:hover { border-color:rgba(200,135,58,0.4) !important; }
      .action-btn-primary:hover { background:#C8873A !important; color:#000 !important; }
      .action-icon-btn:hover { opacity:0.8; transform:scale(1.1); }
      .delete-btn:hover { background:rgba(248,113,113,0.15) !important; border-color:#f87171 !important; }
      .primary-btn:hover { opacity:0.88; }
      .modal-in { animation:scaleIn 0.25s ease; }
      .cat-btn:hover { color:#C8873A !important; border-color:#C8873A !important; }
      input:focus, select:focus, textarea:focus { border-color:rgba(200,135,58,0.5) !important; }

      /* Tooltip graficos */
      .chart-bar {
        position: relative;
      }
      .chart-bar:hover {
        opacity: 0.85;
      }
      .chart-tooltip {
        display: none;
        position: absolute;
        bottom: 105%;
        left: 50%;
        transform: translateX(-50%);
        background: #1e140d;
        border: 1px solid rgba(200,135,58,0.3);
        color: #f0e6d3;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 10;
      }

        display: block;
      }
    `;

    // Append custom styles to document
    const styleSheet1 = document.createElement("style");
    styleSheet1.innerText = shopCSS;
    document.head.appendChild(styleSheet1);

    const styleSheet2 = document.createElement("style");
    styleSheet2.innerText = adminCSS;
    document.head.appendChild(styleSheet2);

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(html`<${App} />`);
  
    </script>
