<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV Marroquinería — Artesanía en Cuero</title>
    
    <!-- React 18 & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- HTM (No Babel!) -->
    <script src="https://unpkg.com/htm@3.1.1/mini/index.js"></script>
    <!-- SheetJS for Excel -->
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <!-- Firebase Config & Services -->
    <script src="firebase-config.js"></script>
    <script src="firebase-service.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { background: #0e0b08; margin: 0; overflow-x: hidden; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/javascript">

    const { useState, useEffect } = React;
    const html = htm.bind(React.createElement);

    const WA_NUMBER = "5491100000000"; // ← REEMPLAZAR CON NÚMERO REAL

    if (WA_NUMBER === "5491100000000") {
      console.warn("⚠️ ATENCIÓN: El número de WhatsApp es un placeholder. Reemplazarlo antes de publicar.");
    }

    const ADMIN_HASH = "c5954fd9ffe65bd178d7dc779a42ed70e942c003e71fe5a85d14fe967a99fae0"; // admin123

    async function checkPassword(input) {
      const encoder = new TextEncoder();
      const data = encoder.encode(input);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex === ADMIN_HASH;
    }

    const ACCENT = "#C8873A";
    const BG = "#0e0b08";
    const SURFACE = "#160f0a";
    const SURFACE2 = "#1e140d";
    const BORDER = "rgba(200,135,58,0.18)";
    const TEXT = "#f0e6d3";
    const MUTED = "#a0856b";

    const INITIAL_PRODUCTS = [
      { id: 1, name: "Bandolera Clásica", category: "Bolsos", price: 18500, colors: ["Camel", "Negro"], description: "Bandolera artesanal en cuero genuino con correa ajustable.", emoji: "👜", tag: "Más vendido", featured: true, available: true },
      { id: 2, name: "Neceser Grande", category: "Neceseres", price: 12000, colors: ["Camel", "Negro"], description: "Neceser acolchado con cierre reforzado. Ideal para viajes.", emoji: "🧳", tag: null, featured: false, available: true },
      { id: 3, name: "Billetera Hombre", category: "Billeteras", price: 7500, colors: ["Marrón", "Negro", "Azul"], description: "Billetera slim con tarjetero. Cuero vacuno de primera calidad.", emoji: "💼", tag: "Nuevo", featured: false, available: true },
      { id: 4, name: "Bolso Casual", category: "Bolsos", price: 22000, colors: ["Camel", "Marrón"], description: "Bolso crossbody con múltiples compartimentos internos.", emoji: "🎒", tag: null, featured: false, available: true },
      { id: 5, name: "Neceser Compacto", category: "Neceseres", price: 9000, colors: ["Negro", "Camel"], description: "Tamaño ideal para el día a día. Forro interior impermeable.", emoji: "🧴", tag: null, featured: false, available: true },
      { id: 6, name: "Billetera Mujer", category: "Billeteras", price: 8200, colors: ["Camel", "Marrón", "Negro"], description: "Billetera compacta con monedero y múltiples bolsillos.", emoji: "👛", tag: "Nuevo", featured: true, available: true },
      { id: 7, name: "Bandolera XL", category: "Bolsos", price: 26000, colors: ["Negro", "Marrón"], description: "Bolso grande ideal para uso diario o trabajo.", emoji: "🗃️", tag: null, featured: false, available: false },
      { id: 8, name: "Tarjetero Slim", category: "Billeteras", price: 4500, colors: ["Marrón", "Negro", "Camel"], description: "Tarjetero minimalista para hasta 8 tarjetas.", emoji: "🪪", tag: null, featured: false, available: true },
    ];

    const INITIAL_SHIPPING_ZONES = [
      { id: "1", name: "Merlo centro", price: 0, active: true },
      { id: "2", name: "San Antonio de Padua", price: 1500, active: true },
      { id: "3", name: "Moreno / Paso del Rey", price: 2000, active: true },
      { id: "4", name: "Resto del AMBA", price: 3500, active: true },
      { id: "5", name: "Interior del país", price: -1, active: true }
    ];

    const INITIAL_COUPONS = [
      { code: "BIENVENIDA", type: "percent", value: 10, minOrder: 0, expiresAt: "", maxUses: 0, usedCount: 0, active: true },
      { code: "CUERO5000", type: "fixed", value: 5000, minOrder: 40000, expiresAt: "", maxUses: 100, usedCount: 0, active: true }
    ];

    const INITIAL_CONFIG = {
      bannerText: "✨ ¡Envíos gratis en Merlo centro! ✨",
      bannerBg: "#C8873A",
      bannerActive: true
    };

    const CATEGORIES = ["Todos", "Bolsos", "Neceseres", "Billeteras"];
    const COLOR_DOTS = { Camel: "#C8873A", Negro: "#1a1a1a", Marrón: "#6B3A2A", Azul: "#2A3A6B" };
    const EMOJIS = ["👜", "🧳", "💼", "🎒", "🧴", "👛", "🗃️", "🪪", "👝", "💍", "🧣", "🎩"];

    const fmt = (n) => new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS", maximumFractionDigits: 0 }).format(n);

    // ─────────────────────────────────────────────
    // HELPERS & PERSISTENCE
    // ─────────────────────────────────────────────
    function migrateProducts(prods) {
      return prods.map((p, i) => ({
        id: p.id,
        name: p.name || "",
        category: p.category || "Bolsos",
        price: Number(p.price) || 0,
        colors: p.colors || [],
        description: p.description || "",
        longDescription: p.longDescription || p.description || "",
        images: p.images || [],
        emoji: p.emoji || "👜",
        tag: p.tag || null,
        featured: !!p.featured,
        available: p.available !== false,
        isNew: p.isNew !== undefined ? !!p.isNew : false,
        createdAt: p.createdAt || (Date.now() - (i * 86400000)),
        specs: {
          material: p.specs?.material || "",
          medidas: p.specs?.medidas || "",
          cierre: p.specs?.cierre || "",
          interior: p.specs?.interior || "",
          ...p.specs
        }
      }));
    }

    function loadProducts() {
      try {
        const saved = localStorage.getItem("mv_products");
        return saved ? migrateProducts(JSON.parse(saved)) : migrateProducts(INITIAL_PRODUCTS);
      } catch { return migrateProducts(INITIAL_PRODUCTS); }
    }

    function loadShippingZones() {
      try {
        const saved = localStorage.getItem("mv_shipping_zones");
        return saved ? JSON.parse(saved) : INITIAL_SHIPPING_ZONES;
      } catch { return INITIAL_SHIPPING_ZONES; }
    }

    function loadCoupons() {
      try {
        const saved = localStorage.getItem("mv_coupons");
        return saved ? JSON.parse(saved) : INITIAL_COUPONS;
      } catch { return INITIAL_COUPONS; }
    }

    function loadConfig() {
      try {
        const saved = localStorage.getItem("mv_config");
        return saved ? JSON.parse(saved) : INITIAL_CONFIG;
      } catch { return INITIAL_CONFIG; }
    }

    function loadOrders() {
      try { return JSON.parse(localStorage.getItem("mv_orders") || "[]"); } catch { return []; }
    }

    function loadCustomers() {
      try { return JSON.parse(localStorage.getItem("mv_customers") || "[]"); } catch { return []; }
    }

    function loadFavorites() {
      try { return JSON.parse(localStorage.getItem("mv_favorites") || "[]"); } catch { return []; }
    }

    // ─────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────
    function App() {
      const [view, setView] = useState("shop"); // "shop" | "admin" | "product"
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [authOpen, setAuthOpen] = useState(false);
      const [dbLoading, setDbLoading] = useState(FirebaseService.isCloudActive());

      // State stores
      const [products, setProducts] = useState(loadProducts);
      const [shippingZones, setShippingZones] = useState(loadShippingZones);
      const [coupons, setCoupons] = useState(loadCoupons);
      const [config, setConfig] = useState(loadConfig);
      const [orders, setOrders] = useState(loadOrders);
      const [customers, setCustomers] = useState(loadCustomers);
      const [favorites, setFavorites] = useState(loadFavorites);

      // Cargar datos asíncronamente de Firebase al iniciar
      useEffect(() => {
        if (!FirebaseService.isCloudActive()) return;

        const syncDatabase = async () => {
          try {
            // Autosiembra (Seeding) si está vacía
            await FirebaseService.autoSeedDatabase(
              INITIAL_PRODUCTS,
              INITIAL_SHIPPING_ZONES,
              INITIAL_COUPONS,
              INITIAL_CONFIG
            );

            // Obtener todos los datos en paralelo
            const [prods, zones, coups, conf, ords, custs] = await Promise.all([
              FirebaseService.getProducts(),
              FirebaseService.getShippingZones(),
              FirebaseService.getCoupons(),
              FirebaseService.getConfig(),
              FirebaseService.getOrders(),
              FirebaseService.getCustomers()
            ]);

            if (prods) { setProducts(prods); localStorage.setItem("mv_products", JSON.stringify(prods)); }
            if (zones) { setShippingZones(zones); localStorage.setItem("mv_shipping_zones", JSON.stringify(zones)); }
            if (coups) { setCoupons(coups); localStorage.setItem("mv_coupons", JSON.stringify(coups)); }
            if (conf) { setConfig(conf); localStorage.setItem("mv_config", JSON.stringify(conf)); }
            if (ords) { setOrders(ords); localStorage.setItem("mv_orders", JSON.stringify(ords)); }
            if (custs) { setCustomers(custs); localStorage.setItem("mv_customers", JSON.stringify(custs)); }
          } catch (err) {
            console.error("❌ [Firebase] Error al sincronizar con la nube:", err);
          } finally {
            setDbLoading(false);
          }
        };

        syncDatabase();
      }, []);

      const updateProducts = async (next) => {
        setProducts(next);
        localStorage.setItem("mv_products", JSON.stringify(next));
        if (FirebaseService.isCloudActive()) {
          try {
            const cloudProds = await FirebaseService.getProducts();
            const nextIds = next.map(p => p.id);
            for (const c of cloudProds) {
              if (!nextIds.includes(c.id)) {
                await FirebaseService.deleteProduct(c.id);
              }
            }
            for (const p of next) {
              await FirebaseService.saveProduct(p);
            }
          } catch (e) {
            console.error("[Firebase] Error al guardar productos:", e);
          }
        }
      };

      const updateShippingZones = async (next) => {
        setShippingZones(next);
        localStorage.setItem("mv_shipping_zones", JSON.stringify(next));
        if (FirebaseService.isCloudActive()) {
          try {
            for (const z of next) {
              await FirebaseService.saveShippingZone(z);
            }
          } catch (e) {
            console.error("[Firebase] Error al guardar zonas de envío:", e);
          }
        }
      };

      const updateCoupons = async (next) => {
        setCoupons(next);
        localStorage.setItem("mv_coupons", JSON.stringify(next));
        if (FirebaseService.isCloudActive()) {
          try {
            const cloudCoups = await FirebaseService.getCoupons();
            const nextCodes = next.map(c => c.code);
            for (const c of cloudCoups) {
              if (!nextCodes.includes(c.code)) {
                await FirebaseService.deleteCoupon(c.code);
              }
            }
            for (const c of next) {
              await FirebaseService.saveCoupon(c);
            }
          } catch (e) {
            console.error("[Firebase] Error al guardar cupones:", e);
          }
        }
      };

      const updateConfig = async (next) => {
        setConfig(next);
        localStorage.setItem("mv_config", JSON.stringify(next));
        if (FirebaseService.isCloudActive()) {
          try {
            await FirebaseService.saveConfig(next);
          } catch (e) {
            console.error("[Firebase] Error al guardar configuración:", e);
          }
        }
      };

      const updateOrders = async (next) => {
        setOrders(next);
        localStorage.setItem("mv_orders", JSON.stringify(next));
        if (FirebaseService.isCloudActive()) {
          try {
            for (const o of next) {
              await FirebaseService.saveOrder(o);
            }
          } catch (e) {
            console.error("[Firebase] Error al guardar pedidos:", e);
          }
        }
      };

      const updateCustomers = async (next) => {
        setCustomers(next);
        localStorage.setItem("mv_customers", JSON.stringify(next));
        if (FirebaseService.isCloudActive()) {
          try {
            for (const c of next) {
              await FirebaseService.saveCustomer(c);
            }
          } catch (e) {
            console.error("[Firebase] Error al guardar clientes:", e);
          }
        }
      };

      const updateFavorites = (next) => { setFavorites(next); localStorage.setItem("mv_favorites", JSON.stringify(next)); };

      if (dbLoading) return html`
        <div style=${{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: BG, color: TEXT, gap: 16 }}>
          <div style=${{ width: 44, height: 44, border: "3px solid rgba(200,135,58,0.2)", borderTopColor: ACCENT, borderRadius: "50%", animation: "spin 1s linear infinite" }}></div>
          <p style=${{ fontFamily: "'Cormorant Garamond',serif", fontSize: 18, letterSpacing: 2, color: MUTED }}>Sincronizando con la nube...</p>
          <style>
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
          </style>
        </div>
      `;

      if (view === "admin") return html`
        <${AdminPanel}
          products=${products}
          updateProducts=${updateProducts}
          shippingZones=${shippingZones}
          updateShippingZones=${updateShippingZones}
          coupons=${coupons}
          updateCoupons=${updateCoupons}
          config=${config}
          updateConfig=${updateConfig}
          orders=${orders}
          updateOrders=${updateOrders}
          customers=${customers}
          updateCustomers=${updateCustomers}
          onExit=${() => setView("shop")}
        />
      `;

      return html`
        <${Shop}
          products=${products}
          shippingZones=${shippingZones}
          coupons=${coupons}
          updateCoupons=${updateCoupons}
          config=${config}
          orders=${orders}
          updateOrders=${updateOrders}
          customers=${customers}
          updateCustomers=${updateCustomers}
          favorites=${favorites}
          updateFavorites=${updateFavorites}
          onOpenAuth=${() => setAuthOpen(true)}
          view=${view}
          setView=${setView}
          selectedProduct=${selectedProduct}
          setSelectedProduct=${setSelectedProduct}
        >
          ${authOpen && html`
            <${AuthModal}
              onSuccess=${() => { setAuthOpen(false); setView("admin"); }}
              onClose=${() => setAuthOpen(false)}
            />
          `}
        </${Shop}>
      `;
    }

    // ─────────────────────────────────────────────
    // AUTH MODAL
    // ─────────────────────────────────────────────
    function AuthModal({ onSuccess, onClose }) {
      const [pass, setPass] = useState("");
      const [error, setError] = useState(false);
      const [shake, setShake] = useState(false);

      const submit = async () => {
        const isValid = await checkPassword(pass);
        if (isValid) { onSuccess(); }
        else {
          setError(true); setShake(true);
          setTimeout(() => setShake(false), 500);
        }
      };

      return html`
        <div style=${s.overlayModal} onClick=${onClose}>
          <div
            style=${{ ...s.authBox, animation: shake ? "shake 0.4s ease" : "scaleIn 0.25s ease" }}
            onClick=${e => e.stopPropagation()}
            className="modal-in"
          >
            <p style=${{ fontFamily: "'Cinzel Decorative',serif", color: ACCENT, fontSize: 18, letterSpacing: 4, marginBottom: 24 }}>MV ADMIN</p>
            <input
              type="password"
              placeholder="Contraseña..."
              value=${pass}
              onChange=${e => { setPass(e.target.value); setError(false); }}
              onKeyDown=${e => e.key === "Enter" && submit()}
              style=${{ ...s.authInput, borderColor: error ? "#f87171" : BORDER }}
              autoFocus=${true}
            />
            ${error && html`<p style=${{ color: "#f87171", fontSize: 12, marginTop: 8 }}>Contraseña incorrecta</p>`}
            <button style=${s.goldBtn} onClick=${submit}>ENTRAR</button>
            <button style=${s.ghostBtnSm} onClick=${onClose}>Cancelar</button>
          </div>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // LIGHTBOX ZOOM MODAL
    // ─────────────────────────────────────────────
    function LightboxModal({ images, initialIndex, onClose }) {
      const [index, setIndex] = useState(initialIndex);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "Escape") onClose();
          if (e.key === "ArrowRight") setIndex(prev => (prev + 1) % images.length);
          if (e.key === "ArrowLeft") setIndex(prev => (prev - 1 + images.length) % images.length);
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [images]);

      if (!images || images.length === 0) return null;

      return html`
        <div style=${s.overlayModal} onClick=${onClose}>
          <div style=${{ position: "relative", width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column" }} onClick=${e => e.stopPropagation()} className="modal-in">
            <button style=${{ position: "absolute", top: 24, right: 24, background: "none", border: "none", color: "#fff", fontSize: 32, cursor: "pointer", zIndex: 1002 }} onClick=${onClose}>✕</button>
            <img src=${images[index]} style=${{ maxWidth: "90vw", maxHeight: "80vh", objectFit: "contain", borderRadius: 8, boxShadow: "0 10px 45px rgba(0,0,0,0.9)" }} />
            ${images.length > 1 && html`
              <div style=${{ position: "absolute", width: "100%", display: "flex", justifyContent: "space-between", padding: "0 32px", pointerEvents: "none" }}>
                <button style=${{ pointerEvents: "auto", background: "rgba(0,0,0,0.6)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: "50%", width: 50, height: 50, color: "#fff", fontSize: 24, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }} onClick=${() => setIndex(prev => (prev - 1 + images.length) % images.length)}>←</button>
                <button style=${{ pointerEvents: "auto", background: "rgba(0,0,0,0.6)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: "50%", width: 50, height: 50, color: "#fff", fontSize: 24, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }} onClick=${() => setIndex(prev => (prev + 1) % images.length)}>→</button>
              </div>
            `}
            ${images.length > 1 && html`
              <div style=${{ display: "flex", gap: 8, marginTop: 24 }}>
                ${images.map((_, i) => html`
                  <span key=${i} style=${{ width: 8, height: 8, borderRadius: "50%", background: index === i ? ACCENT : MUTED, transition: "background 0.3s" }} />
                `)}
              </div>
            `}
          </div>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // TOAST RECUPERACIÓN CARRITO
    // ─────────────────────────────────────────────
    function CartRecoveryToast({ count, onOpen, onClose }) {
      return html`
        <div style=${s.recoveryToast} className="recovery-toast-in">
          <div style=${{ display: "flex", flexDirection: "column", gap: 10 }}>
            <p style=${{ margin: 0, fontSize: 13, fontWeight: 500, fontFamily: "sans-serif" }}>🛒 Tenés ${count} productos guardados en tu carrito</p>
            <div style=${{ display: "flex", gap: 12, alignItems: "center" }}>
              <button style=${{ background: ACCENT, color: "#000", border: "none", borderRadius: 4, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }} onClick=${onOpen}>Ver carrito →</button>
              <button style=${{ background: "none", border: "none", color: MUTED, fontSize: 12, cursor: "pointer", textDecoration: "underline", fontFamily: "sans-serif" }} onClick=${onClose}>Descartar</button>
            </div>
          </div>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // MODAL PRE-CHECKOUT
    // ─────────────────────────────────────────────
    function CheckoutModal({ onConfirm, onClose, clientData }) {
      const [name, setName] = useState(clientData?.name || "");
      const [phone, setPhone] = useState(clientData?.phone || "");
      const [remember, setRemember] = useState(true);

      const submit = () => {
        if (!name || !phone) return;
        onConfirm({ name, phone, remember });
      };

      return html`
        <div style=${s.overlayModal} onClick=${onClose}>
          <div style=${{ ...s.authBox, maxWidth: 400 }} onClick=${e => e.stopPropagation()} className="modal-in">
            <h3 style=${{ fontSize: 22, margin: "0 0 12px", fontFamily: "'Cormorant Garamond',serif", color: TEXT }}>Completa tus datos</h3>
            <p style=${{ fontSize: 13, color: MUTED, marginBottom: 20, fontFamily: "sans-serif", lineHeight: 1.5 }}>Para procesar tu pedido, indícanos tu nombre y WhatsApp.</p>
            
            <div style=${{ width: "100%", display: "flex", flexDirection: "column", gap: 14, textAlign: "left", marginBottom: 20 }}>
              <div>
                <label style=${s.label}>Nombre *</label>
                <input value=${name} onChange=${e => setName(e.target.value)} placeholder="Ej: Juan Pérez" style=${s.input} />
              </div>
              <div>
                <label style=${s.label}>WhatsApp *</label>
                <input value=${phone} onChange=${e => setPhone(e.target.value)} placeholder="Ej: 11 5555 8888" style=${s.input} />
              </div>
              <label style=${{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: TEXT, fontFamily: "sans-serif" }}>
                <input type="checkbox" checked=${remember} onChange=${e => setRemember(e.target.checked)} style=${{ accentColor: ACCENT }} />
                Recordar mis datos
              </label>
            </div>

            <div style=${{ display: "flex", gap: 12, width: "100%" }}>
              <button style=${{ flex: 1, padding: 12, background: SURFACE2, border: "1px solid " + BORDER, color: TEXT, borderRadius: 8, cursor: "pointer", fontFamily: "sans-serif" }} onClick=${onClose}>Cancelar</button>
              <button style=${{ flex: 2, padding: 12, background: ACCENT, border: "none", color: "#000", borderRadius: 8, cursor: "pointer", fontWeight: 700, fontFamily: "sans-serif" }} onClick=${submit}>Confirmar pedido →</button>
            </div>
          </div>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // TIENDA / CATÁLOGO / COMPONENTES
    // ─────────────────────────────────────────────
    function Shop({
      products, shippingZones, coupons, updateCoupons, config, orders, updateOrders, customers, updateCustomers, favorites, updateFavorites, onOpenAuth,
      view, setView, selectedProduct, setSelectedProduct, children
    }) {
      const [activeCategory, setActiveCategory] = useState("Todos");
      const [logoLoaded, setLogoLoaded] = useState(false);
      const [cart, setCart] = useState(() => { try { return JSON.parse(localStorage.getItem("mv_cart") || "[]"); } catch { return []; } });
      const [cartOpen, setCartOpen] = useState(false);
      const [selectedColors, setSelectedColors] = useState({});
      const [addedId, setAddedId] = useState(null);
      const [heroVisible, setHeroVisible] = useState(false);

      // Search & Filters state
      const [searchTerm, setSearchTerm] = useState("");
      const [sortOption, setSortOption] = useState("featured");

      // Dynamic price calculation
      const visibleProducts = products.filter(p => p.available !== false);
      const allPrices = visibleProducts.map(p => p.price);
      const maxPossiblePrice = allPrices.length ? Math.max(...allPrices) : 50000;
      const [priceFilter, setPriceFilter] = useState([0, maxPossiblePrice]);

      // Shipping calculator state
      const activeShippingZones = shippingZones.filter(z => z.active);
      const [selectedZone, setSelectedZone] = useState(activeShippingZones[0] || null);
      const [shippingCalcExpanded, setShippingCalcExpanded] = useState(false);

      // Coupon application state
      const [couponInput, setCouponInput] = useState("");
      const [appliedCoupon, setAppliedCoupon] = useState(null);
      const [couponError, setCouponError] = useState("");
      const [couponSuccess, setCouponSuccess] = useState("");

      // Favorites tab helper
      const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);

      // Toast recovery & Pre-checkout states
      const [showRecoveryToast, setShowRecoveryToast] = useState(false);
      const [checkoutOpen, setCheckoutOpen] = useState(false);
      const [lightboxState, setLightboxState] = useState(null); // { images, index }
      const [bannerClosed, setBannerClosed] = useState(() => !!sessionStorage.getItem("mv_banner_closed"));

      // Local storage client data
      const [clientData, setClientData] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mv_client") || "null"); } catch { return null; }
      });

      useEffect(() => { setTimeout(() => setHeroVisible(true), 100); }, []);
      useEffect(() => { try { localStorage.setItem("mv_cart", JSON.stringify(cart)); } catch { } }, [cart]);

      // Cart recovery check
      useEffect(() => {
        const isRecovered = sessionStorage.getItem("mv_cart_recovered");
        if (cart.length > 0 && !isRecovered) {
          const t = setTimeout(() => {
            setShowRecoveryToast(true);
            sessionStorage.setItem("mv_cart_recovered", "true");
          }, 1000);
          return () => clearTimeout(t);
        }
      }, [cart]);

      const cartCount = cart.reduce((s, i) => s + i.qty, 0);
      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

      // Coupon discount calculation
      const discount = appliedCoupon ? (
        appliedCoupon.type === "percent"
          ? Math.round(subtotal * (appliedCoupon.value / 100))
          : appliedCoupon.value
      ) : 0;

      // Shipping price calculation
      const shippingPrice = selectedZone ? (selectedZone.price === -1 ? 0 : selectedZone.price) : 0;
      const finalTotal = Math.max(0, subtotal - discount + shippingPrice);

      const toggleFavorite = (id, e) => {
        e.stopPropagation();
        const next = favorites.includes(id) ? favorites.filter(fid => fid !== id) : [...favorites, id];
        updateFavorites(next);
      };

      const addToCart = (product, colorOver, qtyOver) => {
        const color = colorOver || selectedColors[product.id] || product.colors[0];
        const qty = qtyOver || 1;
        const key = product.id + "-" + color;
        setCart(prev => {
          const exists = prev.find(i => i.key === key);
          if (exists) return prev.map(i => i.key === key ? { ...i, qty: i.qty + qty } : i);
          return [...prev, { ...product, color, key, qty }];
        });
        setAddedId(product.id);
        setTimeout(() => setAddedId(null), 1200);
      };

      const updateQty = (key, delta) => setCart(prev =>
        prev.map(i => i.key === key ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0)
      );

      const applyCoupon = () => {
        setCouponError("");
        setCouponSuccess("");
        const code = couponInput.trim().toUpperCase();
        if (!code) return;
        const cp = coupons.find(c => c.code === code && c.active);
        if (!cp) { setCouponError("Cupón no válido."); return; }
        if (cp.expiresAt && new Date(cp.expiresAt) < new Date()) { setCouponError("El cupón está vencido."); return; }
        if (cp.maxUses > 0 && cp.usedCount >= cp.maxUses) { setCouponError("Cupón agotado."); return; }
        if (subtotal < cp.minOrder) { setCouponError("Compra mínima requerida: " + fmt(cp.minOrder)); return; }

        setAppliedCoupon(cp);
        setCouponSuccess("✓ Aplicado: " + (cp.type === "percent" ? cp.value + "%" : fmt(cp.value)) + " desc.");
      };

      const handlePreCheckout = () => {
        if (!cart.length) return;
        setCheckoutOpen(true);
      };

      const processCheckout = ({ name, phone, remember }) => {
        if (remember) {
          localStorage.setItem("mv_client", JSON.stringify({ name, phone }));
        } else {
          localStorage.removeItem("mv_client");
        }
        setClientData({ name, phone });
        setCheckoutOpen(false);

        // WA checkout message
        const lines = cart.map(i => "• " + i.name + " (" + i.color + ") x" + i.qty + " — " + fmt(i.price * i.qty)).join("%0A");
        const shippingStr = selectedZone ? (selectedZone.price === -1 ? selectedZone.name + " (A consultar)" : selectedZone.name + " (" + (selectedZone.price === 0 ? "Gratis" : fmt(selectedZone.price)) + ")") : "No especificado";
        const couponStr = appliedCoupon ? "%0ACupón aplicado: " + appliedCoupon.code + " (-" + fmt(discount) + ")" : "";
        const msg = "¡Hola! 👋 Quiero hacer el siguiente pedido:%0A%0A" + lines + "%0A%0A📍 Zona de envío: " + shippingStr + couponStr + "%0A*Total a abonar: " + fmt(finalTotal) + "*%0A%0ACliente: " + name + "%0ATeléfono: " + phone;
        
        // Save order globally
        const newOrder = {
          id: "ORD-" + Date.now(),
          date: new Date().toISOString(),
          clientName: name,
          clientPhone: phone,
          items: cart.map(i => ({ name: i.name, color: i.color, qty: i.qty, price: i.price })),
          subtotal: subtotal,
          shippingZone: selectedZone ? selectedZone.name : "",
          shippingCost: shippingPrice,
          couponCode: appliedCoupon ? appliedCoupon.code : null,
          discount: discount,
          total: finalTotal,
          status: "pendiente"
        };
        const nextOrders = [newOrder, ...orders];
        updateOrders(nextOrders);

        // Update customer statistics
        const existingCust = customers.find(c => c.phone === phone);
        if (existingCust) {
          const updatedCust = {
            ...existingCust,
            name,
            totalOrders: existingCust.totalOrders + 1,
            totalSpent: existingCust.totalSpent + finalTotal,
            lastOrder: new Date().toISOString(),
            orders: [...existingCust.orders, newOrder.id]
          };
          updateCustomers(customers.map(c => c.phone === phone ? updatedCust : c));
        } else {
          const newCust = {
            phone,
            name,
            totalOrders: 1,
            totalSpent: finalTotal,
            lastOrder: new Date().toISOString(),
            orders: [newOrder.id],
            notes: ""
          };
          updateCustomers([...customers, newCust]);
        }

        // Update coupon counts
        if (appliedCoupon) {
          updateCoupons(coupons.map(c => c.code === appliedCoupon.code ? { ...c, usedCount: c.usedCount + 1 } : c));
        }

        window.open("https://wa.me/" + WA_NUMBER + "?text=" + msg, "_blank");
        setCart([]);
        setCartOpen(false);
      };

      // Catologue filtering
      let filtered = visibleProducts;

      // 1. Search
      if (searchTerm) {
        const query = searchTerm.toLowerCase();
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(query) ||
          p.category.toLowerCase().includes(query) ||
          p.description.toLowerCase().includes(query)
        );
      }

      // 2. Category / Favorites
      if (showFavoritesOnly) {
        filtered = filtered.filter(p => favorites.includes(p.id));
      } else if (activeCategory !== "Todos") {
        filtered = filtered.filter(p => p.category === activeCategory);
      }

      // 3. Price slider
      filtered = filtered.filter(p => p.price >= priceFilter[0] && p.price <= priceFilter[1]);

      // 4. Sort
      if (sortOption === "featured") {
        filtered.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
      } else if (sortOption === "priceAsc") {
        filtered.sort((a, b) => a.price - b.price);
      } else if (sortOption === "priceDesc") {
        filtered.sort((a, b) => b.price - a.price);
      } else if (sortOption === "newest") {
        filtered.sort((a, b) => b.createdAt - a.createdAt);
      }

      const resetFilters = () => {
        setSearchTerm("");
        setPriceFilter([0, maxPossiblePrice]);
        setSortOption("featured");
        setActiveCategory("Todos");
        setShowFavoritesOnly(false);
      };

      const removeFromCart = (key) => setCart(prev => prev.filter(i => i.key !== key));

      // ─────────────────────────────────────────────
      // CONDITIONAL RENDER PIECES (NO NESTED TEMPLATE LITERALS!)
      // ─────────────────────────────────────────────
      
      // 1. Promotional Banner
      const bannerHtml = (config.bannerActive && config.bannerText && !bannerClosed) ? html`
        <div style=${{ background: config.bannerBg || ACCENT, color: "#000", height: 40, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", zIndex: 1001, padding: "0 40px", fontSize: 13, fontWeight: 700, letterSpacing: 1, fontFamily: "sans-serif" }}>
          <span>${config.bannerText}</span>
          <button style=${{ position: "absolute", right: 16, background: "none", border: "none", color: "#000", fontSize: 16, fontWeight: 700, cursor: "pointer" }} onClick=${() => { setBannerClosed(true); sessionStorage.setItem("mv_banner_closed", "true"); }}>✕</button>
        </div>
      ` : "";

      // 2. Hero Header
      const heroHtml = (view === "shop") ? html`
        <header style=${{ ...s.hero, opacity: heroVisible ? 1 : 0, transform: heroVisible ? "translateY(0)" : "translateY(24px)" }}>
          <div style=${s.heroGrain} />
          <div style=${{ position: "relative", zIndex: 2, maxWidth: 600 }}>
            <p style=${{ fontSize: 12, letterSpacing: 4, color: ACCENT, textTransform: "uppercase", marginBottom: 20, fontFamily: "sans-serif" }}>— Zona Oeste, Merlo —</p>
            <h1 style=${{ fontSize: "clamp(48px,8vw,88px)", fontWeight: 300, lineHeight: 1.05, margin: "0 0 24px", color: TEXT }}>

            <p style=${{ fontSize: 16, color: MUTED, lineHeight: 1.7, marginBottom: 36, fontFamily: "sans-serif", fontWeight: 300 }}>

            <button className="cta-btn" style=${s.goldBtn} onClick=${() => document.getElementById("productos").scrollIntoView({ behavior: "smooth" })}>
              VER PRODUCTOS
            </button>
          </div>
          <div style=${{ position: "absolute", right: -100, top: "50%", transform: "translateY(-50%)", width: 500, height: 500, borderRadius: "50%", border: "1px solid rgba(200,135,58,0.1)" }} />
        </header>
      ` : "";

      // 3. Search Bar Clear button
      const searchTermClearHtml = searchTerm ? html`
        <button style=${{ background: "none", border: "none", color: MUTED, cursor: "pointer", fontSize: 16 }} onClick=${() => setSearchTerm("")}>✕</button>
      ` : "";

      // 4. Categories list map
      const categoriesHtml = CATEGORIES.map(c => html`
        <button key=${c} style=${{ ...s.catBtn, ...(!showFavoritesOnly && activeCategory === c ? s.catBtnActive : {}) }} onClick=${() => { setShowFavoritesOnly(false); setActiveCategory(c); }} className="cat-btn">${c}</button>
      `);

      // 5. Favorites Count Badge
      const favoritesCountHtml = favorites.length > 0 ? html`(${favorites.length})` : "";

      // 6. Clean Filters
      const cleanFiltersHtml = (searchTerm || activeCategory !== "Todos" || showFavoritesOnly || priceFilter[0] > 0 || priceFilter[1] < maxPossiblePrice) ? html`
        <button onClick=${resetFilters} style=${{ background: "none", border: "none", color: ACCENT, textDecoration: "underline", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "sans-serif" }}>Limpiar filtros</button>
      ` : "";

      // 7. Product cards map
      const productCardsHtml = filtered.map((p, i) => html`
        <${ShopProductCard}
          key=${p.id}
          product=${p}
          index=${i}
          isFavorite=${favorites.includes(p.id)}
          onToggleFavorite=${(e) => toggleFavorite(p.id, e)}
          selectedColors=${selectedColors}
          setSelectedColors=${setSelectedColors}
          addedId=${addedId}
          onAddToCart=${() => addToCart(p)}
          onSelectDetail=${() => { setSelectedProduct(p); setView("product"); }}
        />
      `);

      // 8. No Matches Found
      const noMatchesHtml = (filtered.length === 0) ? html`
        <div style=${{ textAlign: "center", padding: "80px 24px", color: MUTED }}>
          <span style=${{ fontSize: 48, display: "block", marginBottom: 16 }}>🔍</span>
          <h3 style=${{ fontSize: 20, fontFamily: "'Cormorant Garamond',serif", color: TEXT }}>No encontramos coincidencias</h3>
          <p style=${{ fontSize: 14, fontFamily: "sans-serif", marginTop: 8, marginBottom: 20 }}>Intentá modificando los filtros o la búsqueda.</p>
          <button style=${s.goldBtn} onClick=${resetFilters} style=${{ maxWidth: 200, margin: "0 auto" }}>Limpiar filtros</button>
        </div>
      ` : "";

      // 9. Main catalog container
      const mainContainerHtml = (view === "shop") ? html`
        <section id="productos" style=${{ maxWidth: 1200, margin: "0 auto", padding: "60px 24px" }}>
          <h2 style=${{ fontSize: "clamp(28px,4vw,44px)", fontWeight: 300, marginBottom: 24 }}>Nuestros Productos</h2>
          
          <!-- BUSCADOR & FILTROS BARRA -->
          <div style=${{ display: "flex", flexDirection: "column", gap: 20, marginBottom: 36, padding: 20, background: SURFACE, border: "1px solid " + BORDER, borderRadius: 12 }}>
            <div style=${{ display: "flex", flexWrap: "wrap", gap: 16, alignItems: "center", justifyContent: "space-between" }}>
              
              <!-- BUSCADOR -->
              <div style=${{ display: "flex", alignItems: "center", gap: 10, background: SURFACE2, border: "1px solid " + BORDER, borderRadius: 8, padding: "8px 14px", flex: 1, minWidth: 260 }}>
                <span style=${{ color: MUTED }}>🔍</span>
                <input placeholder="Buscar productos..." value=${searchTerm} onChange=${e => setSearchTerm(e.target.value)} style=${{ background: "none", border: "none", outline: "none", color: TEXT, fontSize: 14, fontFamily: "sans-serif", width: "100%" }} />
                ${searchTermClearHtml}
              </div>

              <!-- ORDENAMIENTO -->
              <div style=${{ display: "flex", alignItems: "center", gap: 8 }}>
                <label style=${{ ...s.label, marginBottom: 0 }}>ORDENAR BY</label>
                <select value=${sortOption} onChange=${e => setSortOption(e.target.value)} style=${{ ...s.input, width: 180, padding: "8px 12px" }}>
                  <option value="featured">Destacados primero</option>
                  <option value="priceAsc">Menor precio</option>
                  <option value="priceDesc">Mayor precio</option>
                  <option value="newest">Más nuevos</option>
                </select>
              </div>

              <!-- SLIDER DOBLE DE PRECIO -->
              <div style=${{ display: "flex", flexDirection: "column", gap: 6, minWidth: 200, width: "100%", maxWidth: 300 }}>
                <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                  <label style=${s.label}>PRECIO</label>
                  <span style=${{ fontSize: 12, color: ACCENT, fontFamily: "sans-serif", fontWeight: 700 }}>${fmt(priceFilter[0])} — ${fmt(priceFilter[1])}</span>
                </div>
                <div style=${{ position: "relative", height: 16, display: "flex", alignItems: "center", marginTop: 4 }}>
                  <div style=${{ position: "absolute", left: 0, right: 0, height: 4, background: "rgba(200,135,58,0.1)", borderRadius: 2 }} />
                  <input
                    type="range"
                    min="0"
                    max=${maxPossiblePrice}
                    value=${priceFilter[0]}
                    onChange=${e => setPriceFilter([Math.min(Number(e.target.value), priceFilter[1]), priceFilter[1]])}
                    className="dual-slider"
                  />
                  <input
                    type="range"
                    min="0"
                    max=${maxPossiblePrice}
                    value=${priceFilter[1]}
                    onChange=${e => setPriceFilter([priceFilter[0], Math.max(Number(e.target.value), priceFilter[0])])}
                    className="dual-slider"
                  />
                </div>
              </div>

            </div>

            <!-- CATEGORIES TABS + FAVORITOS TAB -->
            <div style=${{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center", justifyContent: "space-between", borderTop: "1px solid rgba(200,135,58,0.08)", paddingTop: 16 }}>
              <div style=${{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                ${categoriesHtml}
                <button style=${{ ...s.catBtn, ...(showFavoritesOnly ? s.catBtnActive : {}) }} onClick=${() => setShowFavoritesOnly(true)} className="cat-btn">
                  ❤ Guardados ${favoritesCountHtml}
                </button>
              </div>
              
              <!-- COUNTER & CLEAN FILTERS -->
              <div style=${{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style=${{ fontSize: 13, color: MUTED, fontFamily: "sans-serif" }}>Mostrando ${filtered.length} de ${visibleProducts.length} productos</span>
                ${cleanFiltersHtml}
              </div>
            </div>
          </div>

          <!-- PRODUCT GRID -->
          <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(280px,1fr))", gap: 24 }}>
            ${productCardsHtml}
          </div>

          ${noMatchesHtml}
        </section>
      ` : "";

      // 10. Product detail view
      const productDetailHtml = (view === "product" && selectedProduct) ? html`
        <${ProductDetail}
          product=${selectedProduct}
          allProducts=${products}
          onBack=${() => setView("shop")}
          onAddToCart=${(color, qty) => addToCart(selectedProduct, color, qty)}
          isFavorite=${favorites.includes(selectedProduct.id)}
          onToggleFavorite=${(e) => toggleFavorite(selectedProduct.id, e)}
          onSelectDetail=${(p) => setSelectedProduct(p)}
        />
      ` : "";

      // 11. Promotional highlights bottom strip
      const stripHtml = (view === "shop") ? html`
        <div style=${{ borderTop: "1px solid " + BORDER, borderBottom: "1px solid " + BORDER, background: SURFACE, padding: "30px 24px", marginTop: 40 }}>
          <div style=${{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 24, textAlign: "center" }}>
            <div>
              <span style=${{ fontSize: 24, display: "block", marginBottom: 8 }}>💼</span>
              <h4 style=${{ fontSize: 14, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>100% CUERO VACUNO</h4>
              <p style=${{ fontSize: 12, color: MUTED, fontFamily: "sans-serif", margin: 0 }}>Garantía de calidad y durabilidad real.</p>
            </div>
            <div>
              <span style=${{ fontSize: 24, display: "block", marginBottom: 8 }}>🙌</span>
              <h4 style=${{ fontSize: 14, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>HECHO A MANO</h4>
              <p style=${{ fontSize: 12, color: MUTED, fontFamily: "sans-serif", margin: 0 }}>Detalles artesanales únicos en cada pieza.</p>
            </div>
            <div>
              <span style=${{ fontSize: 24, display: "block", marginBottom: 8 }}>💳</span>
              <h4 style=${{ fontSize: 14, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>PAGOS FLEXIBLES</h4>
              <p style=${{ fontSize: 12, color: MUTED, fontFamily: "sans-serif", margin: 0 }}>Efectivo, transferencia y opciones de envío.</p>
            </div>
          </div>
        </div>
      ` : "";

      // 12. Cart Header badge
      const cartBadgeHtml = cartCount > 0 ? html`<span style=${s.cartBadge}>${cartCount}</span>` : "";

      // 13. Mapped Cart items
      const cartItemsHtml = cart.map(item => {
        const miniPhotoHtml = (item.images && item.images.length > 0)
          ? html`<img src=${item.images[0]} style=${{ width: 44, height: 44, objectFit: "cover", borderRadius: 4, background: "#f8f8f8" }} />`
          : html`<span style=${{ fontSize: 32, flexShrink: 0 }}>${item.emoji}</span>`;

        return html`
          <div key=${item.key} style=${{ display: "flex", alignItems: "center", gap: 12, padding: "14px 24px", borderBottom: "1px solid rgba(200,135,58,0.08)" }}>
            ${miniPhotoHtml}
            <div style=${{ flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
              <span style=${{ fontSize: 15, fontWeight: 500 }}>${item.name}</span>
              <span style=${{ fontSize: 11, color: MUTED, fontFamily: "sans-serif" }}>${item.color}</span>
              <span style=${{ fontSize: 14, color: ACCENT, fontFamily: "sans-serif" }}>${fmt(item.price)}</span>
            </div>
            <div style=${{ display: "flex", alignItems: "center", gap: 8 }}>
              <button style=${s.qtyBtn} onClick=${() => updateQty(item.key, -1)}>−</button>
              <span style=${{ fontSize: 15, minWidth: 20, textAlign: "center", fontFamily: "sans-serif" }}>${item.qty}</span>
              <button style=${s.qtyBtn} onClick=${() => updateQty(item.key, 1)}>+</button>
            </div>
            <button style=${{ background: "none", border: "none", color: "#4a3828", fontSize: 14, cursor: "pointer" }} onClick=${() => removeFromCart(item.key)}>✕</button>
          </div>
        `;
      });

      // 14. Shipping Calc details
      const shippingCalcDetailsHtml = selectedZone ? html`
        <p style=${{ fontSize: 12, fontFamily: "sans-serif" }}>
          ${selectedZone.price === 0 ? html`<span style=${{ color: "#4ade80", fontWeight: 700 }}>✓ Envío gratis</span>` : selectedZone.price === -1 ? html`<span style=${{ color: MUTED }}>Te informamos el costo por WhatsApp</span>` : html`Costo: <span style=${{ color: ACCENT, fontWeight: 700 }}>${fmt(selectedZone.price)}</span>`}
        </p>
      ` : "";

      // 15. Shipping zones option elements
      const shippingZonesOptionsHtml = activeShippingZones.map(z => html`
        <option key=${z.id} value=${z.id}>${z.name} ${z.price === 0 ? "(Gratis)" : z.price === -1 ? "(Consultar)" : "(" + fmt(z.price) + ")"}</option>
      `);

      // 16. Expanded Shipping selector
      const shippingCalcExpandedHtml = shippingCalcExpanded ? html`
        <div style=${{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
          <select value=${selectedZone ? selectedZone.id : ""} onChange=${e => setSelectedZone(activeShippingZones.find(z => z.id === e.target.value) || null)} style=${s.input}>
            ${shippingZonesOptionsHtml}
          </select>
          ${shippingCalcDetailsHtml}
        </div>
      ` : "";

      // 17. Coupon error & success messages
      const couponErrorHtml = couponError ? html`<p style=${{ color: "#f87171", fontSize: 12, marginTop: 6, fontFamily: "sans-serif" }}>${couponError}</p>` : "";
      const couponSuccessHtml = couponSuccess ? html`<p style=${{ color: "#4ade80", fontSize: 12, marginTop: 6, fontFamily: "sans-serif" }}>${couponSuccess}</p>` : "";

      // 18. Coupon Breakdown row
      const appliedCouponHtml = appliedCoupon ? html`
        <div style=${{ display: "flex", justifyContent: "space-between", color: "#4ade80" }}>
          <span>Descuento (${appliedCoupon.code})</span>
          <span>-${fmt(discount)}</span>
        </div>
      ` : "";

      // 19. Main Cart Drawer Panel contents
      const cartDrawerBodyHtml = (cart.length === 0) ? html`

    function ShopProductCard({ product, index, isFavorite, onToggleFavorite, selectedColors, setSelectedColors, addedId, onAddToCart, onSelectDetail }) {
      const [imgIndex, setImgIndex] = useState(0);
      const [isHovered, setIsHovered] = useState(false);

      const color = selectedColors[product.id] || product.colors[0];

      const handleMouseEnter = () => {
        setIsHovered(true);
        if (product.images && product.images.length > 1) {
          setImgIndex(1);
        }
      };

      const handleMouseLeave = () => {
        setIsHovered(false);
        setImgIndex(0);
      };

      return html`
        <div
          style=${{ ...s.card, animationDelay: (index * 60) + "ms" }}
          className="product-card"
          onMouseEnter=${handleMouseEnter}
          onMouseLeave=${handleMouseLeave}
          onClick=${onSelectDetail}
        >
          <!-- FAVORITO HEART BUTTON -->
          <button
            onClick=${onToggleFavorite}
            style=${{
              position: "absolute",
              top: 14,
              right: 14,
              background: "rgba(0,0,0,0.5)",
              border: "1px solid rgba(255,255,255,0.1)",
              borderRadius: "50%",
              width: 32,
              height: 32,
              display: "flex",
              alignItems: "center",
              justify: "center",
              color: isFavorite ? ACCENT : "#a0856b",
              fontSize: 16,
              cursor: "pointer",
              zIndex: 3,
              fontFamily: "sans-serif",
              transition: "transform 0.2s"
            }}
            className="fav-heart"
          >
            ${isFavorite ? "♥" : "♡"}
          </button>

          <!-- BADGES -->
          <div style=${{ position: "absolute", top: 14, left: 14, display: "flex", flexDirection: "column", gap: 6, zIndex: 2 }}>
            ${product.featured && html`<span style=${s.featuredBadge}>⭐ DESTACADO</span>`}
            ${product.tag && !product.featured && html`<span style=${s.tagBadge}>${product.tag}</span>`}
          </div>

          <!-- PHOTO / EMOJI FALLBACK -->
          ${product.images && product.images.length > 0 ? html`
            <div style=${{ position: "relative", height: 200, width: "100%", background: "#f8f8f8", overflow: "hidden" }}>
              <img
                src=${product.images[imgIndex]}
                style=${{ width: "100%", height: "100%", objectFit: "cover", transition: "transform 0.5s ease" }}
              />
              ${product.images.length > 1 && html`
                <div style=${{ position: "absolute", bottom: 8, left: 0, right: 0, display: "flex", justifyContent: "center", gap: 4 }}>
                  ${product.images.map((_, i) => html`
                    <span key=${i} style=${{ width: 6, height: 6, borderRadius: "50%", background: imgIndex === i ? ACCENT : MUTED }} />
                  `)}
                </div>
              `}
            </div>
          ` : html`
            <div style=${{ fontSize: 64, display: "flex", alignItems: "center", justifyContent: "center", height: 200, background: "rgba(200,135,58,0.06)", borderBottom: "1px solid " + BORDER }}>${product.emoji}</div>
          `}

          <!-- CONTENT -->
          <div style=${{ padding: 20 }}>
            <span style=${{ fontSize: 10, letterSpacing: 3, color: ACCENT, textTransform: "uppercase", fontFamily: "sans-serif" }}>${product.category}</span>
            <h3 style=${{ fontSize: 20, fontWeight: 600, margin: "6px 0 8px" }}>${product.name}</h3>
            <p style=${{ fontSize: 13, color: "#7a6550", lineHeight: 1.6, marginBottom: 14, fontFamily: "sans-serif" }}>${product.description}</p>
            
            <div style=${{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }} onClick=${e => e.stopPropagation()}>
              ${product.colors.map(c => html`
                <button key=${c} title=${c} style=${{ width: 18, height: 18, borderRadius: "50%", border: "none", cursor: "pointer", background: COLOR_DOTS[c] || "#999", outline: color === c ? "2px solid " + ACCENT : "2px solid transparent", outlineOffset: 2 }}
                  onClick=${() => setSelectedColors(s => ({ ...s, [product.id]: c }))} />
              `)}
              <span style=${{ fontSize: 12, color: MUTED, fontFamily: "sans-serif" }}>${color}</span>
            </div>

            <div style=${{ display: "flex", alignItems: "center", justifyContent: "space-between" }} onClick=${e => e.stopPropagation()}>
              <span style=${{ fontSize: 22, fontWeight: 700, color: ACCENT }}>${fmt(product.price)}</span>

            </div>

      `;

    // ─────────────────────────────────────────────

    function ProductDetail({ product, allProducts, onBack, onAddToCart, isFavorite, onToggleFavorite, onSelectDetail, onOpenLightbox }) {
      const [imgIndex, setImgIndex] = useState(0);
      const [color, setColor] = useState(product.colors[0]);
      const [qty, setQty] = useState(1);

      // Reset internal index/color on product swap
      useEffect(() => {
        setImgIndex(0);
        setColor(product.colors[0]);
        setQty(1);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, [product]);

      // Módulo 7: Productos Relacionados logic
      const related = allProducts
        .filter(p => p.id !== product.id && p.available !== false)
        .sort((a, b) => {
          if (a.category === product.category && b.category !== product.category) return -1;
          if (a.category !== product.category && b.category === product.category) return 1;
          if (a.featured && !b.featured) return -1;
          if (!a.featured && b.featured) return 1;
          return Math.abs(a.price - product.price) - Math.abs(b.price - product.price);
        })
        .slice(0, 4);

      const hasSpecs = product.specs && (product.specs.material || product.specs.medidas || product.specs.cierre || product.specs.interior);

      return html`
        <div style=${{ maxWidth: 1200, margin: "0 auto", padding: "40px 24px" }} className="modal-in">
          
          <!-- RETURN HEADER -->
          <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 32 }}>
            <button onClick=${onBack} style=${{ background: "none", border: "1px solid " + BORDER, color: TEXT, padding: "8px 16px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "sans-serif" }}>
              ← Volver al catálogo
            </button>
            <button
              onClick=${onToggleFavorite}
              style=${{ background: "none", border: "1px solid " + BORDER, color: isFavorite ? ACCENT : MUTED, padding: "8px 16px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 6 }}
            >
              ${isFavorite ? "♥ En Favoritos" : "♡ Guardar"}
            </button>
          </div>

          <!-- DETALLE GRID -->
          <div style=${{ display: "grid", gridTemplateColumns: "1fr", gap: 40 }} className="detail-grid">
            
            <!-- COLUMNA IZQUIERDA: GALERIA -->
            <div style=${{ display: "flex", flexDirection: "column", gap: 16 }}>
              ${product.images && product.images.length > 0 ? html`
                <div>
                  <img
                    src=${product.images[imgIndex]}
                    onClick=${() => onOpenLightbox(product.images, imgIndex)}
                    style=${{ width: "100%", height: 500, objectFit: "contain", background: "#160f0a", borderRadius: 12, border: "1px solid " + BORDER, cursor: "pointer" }}
                    className="detail-main-img"
                  />
                </div>
                ${product.images.length > 1 && html`
                  <div style=${{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8 }}>
                    ${product.images.map((img, i) => html`
                      <img
                        key=${i}
                        src=${img}
                        onClick=${() => setImgIndex(i)}
                        style=${{
                          width: 68,
                          height: 68,
                          objectFit: "cover",
                          borderRadius: 8,
                          cursor: "pointer",
                          background: "#160f0a",
                          border: imgIndex === i ? "2px solid " + ACCENT : "1px solid " + BORDER
                        }}
                      />
                    `)}
                  </div>
                `}
              ` : html`
                <div style=${{ fontSize: 120, display: "flex", alignItems: "center", justifyContent: "center", height: 400, background: SURFACE, border: "1px solid " + BORDER, borderRadius: 12 }}>
                  ${product.emoji}
                </div>
              `}
            </div>

            <!-- COLUMNA DERECHA: INFO -->
            <div style=${{ display: "flex", flexDirection: "column", gap: 20 }}>
              <div>
                <span style=${{ fontSize: 12, letterSpacing: 3, color: ACCENT, textTransform: "uppercase", fontWeight: 700, fontFamily: "sans-serif" }}>${product.category}</span>
                <h1 style=${{ fontSize: 40, fontFamily: "'Cormorant Garamond',serif", color: TEXT, marginTop: 8, textTransform: "uppercase" }}>${product.name}</h1>
                ${product.tag && html`<span style=${{ background: ACCENT, color: "#000", fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 4, display: "inline-block", marginTop: 10, letterSpacing: 1 }}>${product.tag}</span>`}
              </div>

              <div style=${{ fontSize: 32, fontWeight: 700, color: ACCENT }}>${fmt(product.price)}</div>

              <hr style=${{ border: "none", borderTop: "1px solid rgba(200,135,58,0.15)" }} />

              <!-- SELECCIÓN DE COLOR -->
              <div>
                <label style=${s.label}>COLOR</label>
                <div style=${{ display: "flex", alignItems: "center", gap: 10, marginTop: 8 }}>
                  ${product.colors.map(c => html`
                    <button key=${c} title=${c} style=${{ width: 26, height: 26, borderRadius: "50%", border: "none", cursor: "pointer", background: COLOR_DOTS[c] || "#999", outline: color === c ? "2.5px solid " + ACCENT : "2.5px solid transparent", outlineOffset: 2 }} onClick=${() => setColor(c)} />
                  `)}
                  <span style=${{ fontSize: 13, color: MUTED, fontFamily: "sans-serif", marginLeft: 6 }}>{color}</span>
                </div>
              </div>

              <!-- SELECCIÓN DE CANTIDAD -->
              <div>
                <label style=${s.label}>CANTIDAD</label>
                <div style=${{ display: "flex", alignItems: "center", gap: 12, marginTop: 8 }}>
                  <button style=${{ ...s.qtyBtn, width: 34, height: 34, fontSize: 18 }} onClick=${() => setQty(Math.max(1, qty - 1))}>−</button>
                  <span style=${{ fontSize: 18, minWidth: 32, textAlign: "center", fontFamily: "sans-serif" }}>${qty}</span>
                  <button style=${{ ...s.qtyBtn, width: 34, height: 34, fontSize: 18 }} onClick=${() => setQty(qty + 1)}>+</button>
                </div>
              </div>

              <!-- AÑADIR BTN -->
              <button
                onClick=${() => onAddToCart(color, qty)}
                style=${{ background: ACCENT, color: "#000", border: "none", borderRadius: 8, padding: "16px 24px", fontSize: 15, fontWeight: 700, textTransform: "uppercase", letterSpacing: 2, cursor: "pointer", width: "100%", fontFamily: "sans-serif", transition: "opacity 0.2s" }}
                className="cta-btn"
              >
                + Agregar al carrito (${fmt(product.price * qty)})
              </button>

              <hr style=${{ border: "none", borderTop: "1px solid rgba(200,135,58,0.15)" }} />

              <!-- DESCRIPCION LARGA -->
              <div>
                <label style=${s.label}>DESCRIPCIÓN</label>
                <p style=${{ fontSize: 14, color: MUTED, lineHeight: 1.7, fontFamily: "sans-serif", marginTop: 8 }}>${product.longDescription || product.description}</p>
              </div>

              <!-- ESPECIFICACIONES -->
              ${hasSpecs && html`
                <div style=${{ marginTop: 10 }}>
                  <label style=${s.label}>ESPECIFICACIONES</label>
                  <table style=${{ width: "100%", borderCollapse: "collapse", fontSize: 13, fontFamily: "sans-serif", color: TEXT, marginTop: 10 }}>
                    <tbody>
                      ${product.specs.material && html`<tr style=${{ borderBottom: "1px solid rgba(200,135,58,0.08)" }}><td style=${{ padding: "8px 0", color: MUTED }}>Material</td><td style=${{ padding: "8px 0", textAlign: "right" }}>${product.specs.material}</td></tr>`}
                      ${product.specs.medidas && html`<tr style=${{ borderBottom: "1px solid rgba(200,135,58,0.08)" }}><td style=${{ padding: "8px 0", color: MUTED }}>Medidas</td><td style=${{ padding: "8px 0", textAlign: "right" }}>${product.specs.medidas}</td></tr>`}
                      ${product.specs.cierre && html`<tr style=${{ borderBottom: "1px solid rgba(200,135,58,0.08)" }}><td style=${{ padding: "8px 0", color: MUTED }}>Cierre</td><td style=${{ padding: "8px 0", textAlign: "right" }}>${product.specs.cierre}</td></tr>`}
                      ${product.specs.interior && html`<tr style=${{ borderBottom: "1px solid rgba(200,135,58,0.08)" }}><td style=${{ padding: "8px 0", color: MUTED }}>Interior</td><td style=${{ padding: "8px 0", textAlign: "right" }}>${product.specs.interior}</td></tr>`}
                    </tbody>
                  </table>
                </div>
              `}

            </div>
          </div>

          <!-- RELACIONADOS GRID -->
          <div style=${{ marginTop: 60, paddingTop: 40, borderTop: "1px solid rgba(200,135,58,0.15)" }}>
            <h3 style=${{ fontSize: 24, fontWeight: 300, marginBottom: 24 }}>También te puede interesar</h3>
            <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(230px,1fr))", gap: 20 }}>
              ${related.map(p => html`
                <div key=${p.id} onClick=${() => onSelectDetail(p)} style=${{ ...s.card, cursor: "pointer" }} className="product-card">
                  ${p.images && p.images.length > 0 ? html`
                    <img src=${p.images[0]} style=${{ width: "100%", height: 160, objectFit: "cover", background: "#160f0a" }} />
                  ` : html`
                    <div style=${{ fontSize: 44, display: "flex", alignItems: "center", justifyContent: "center", height: 160, background: SURFACE }}>${p.emoji}</div>
                  `}
                  <div style=${{ padding: 16 }}>
                    <span style=${{ fontSize: 10, letterSpacing: 2, color: ACCENT, textTransform: "uppercase", fontFamily: "sans-serif" }}>${p.category}</span>
                    <h4 style=${{ fontSize: 16, fontWeight: 600, margin: "4px 0 6px" }}>${p.name}</h4>
                    <div style=${{ fontSize: 16, fontWeight: 700, color: ACCENT }}>${fmt(p.price)}</div>
                  </div>
                </div>
              `)}
            </div>
          </div>

        </div>
      `;
    }

    function AdminProducts({ products, updateProducts, showToast }) {

        updateProducts(products.map(p => p.id === id ? { ...p, featured: !p.featured } : p));

      const toggleAvailable = (id) => {
        updateProducts(products.map(p => p.id === id ? { ...p, available: !p.available } : p));

        updateProducts(products.filter(p => p.id !== id));
